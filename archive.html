<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>周翊然Tz 초화 번역 아카이브</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #F7A4B8;
      --accent-light: #fde8ef;
      --accent-deep: #c45e77;
      --pink: #F7A4B8;
      --pink-dark: #E8839A;
      --pink-deep: #c45e77;
      --pink-light: #fde8ef;
      --pink-pale: #fff5f8;
      --text: #2a1a20;
      --text-muted: #8a6070;
      --text-light: #c4a0ae;
      --border: #f0d0da;
      --white: #ffffff;
      --card-bg: #fffbfc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--pink-pale); color: var(--text); min-height: 100vh; }
    .zh { font-family: 'Noto Sans SC', 'Pretendard', sans-serif; font-weight: 300; }

    /* HERO */
    .hero { background: linear-gradient(135deg, #fde8ef 0%, #fdf0f4 60%, #fff0f5 100%); border-bottom: 1px solid var(--border); padding: 1.5rem 1.5rem 2rem; }
    .hero-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; gap: 1.75rem; }
    .hero-avatar { width: 126px; height: 126px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 3px solid white; box-shadow: 0 4px 20px rgba(247,164,184,0.4); }
    .hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info h1 { font-size: 22px; font-weight: 700; color: var(--pink-deep); margin-bottom: 4px; }
    .hero-info p { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.6; }
    .hero-notice { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
    .hero-notice-desc { font-size: 11px; color: var(--text-light); margin-top: 4px; }

    .main-layout { max-width: 960px; margin: 0 auto; padding: 1.5rem; display: grid; grid-template-columns: 1fr 250px; gap: 1.5rem; align-items: start; }

    /* FEED */
    .feed-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .feed-title { font-size: 15px; font-weight: 700; color: var(--pink-deep); display: flex; align-items: center; gap: 8px; }
    .feed-title::before { content: ''; display: block; width: 3px; height: 16px; background: var(--pink); border-radius: 2px; }
    .post-count-badge { font-size: 11px; background: var(--pink-light); color: var(--pink-deep); padding: 2px 8px; border-radius: 10px; font-weight: 500; }

    /* 날짜 인덱스 */
    .date-index { display: flex; align-items: center; gap: 10px; margin: 1.2rem 0 0.6rem; }
    .date-index-badge { font-size: 11px; font-weight: 700; color: var(--pink-deep); background: var(--pink-light); padding: 3px 10px; border-radius: 10px; white-space: nowrap; }
    .date-index-line { flex: 1; height: 1px; background: var(--border); }

    .post-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; transition: box-shadow 0.2s; }
    .post-card:hover { box-shadow: 0 4px 20px rgba(247,164,184,0.2); }

    /* POST META */
    .post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .actor-avatar { width: 42px; height: 42px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--pink-light); }
    .actor-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .post-meta-info { flex: 1; }
    .actor-name { font-size: 14px; font-weight: 700; color: var(--pink-deep); }
    .post-date { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .weibo-link { font-size: 11px; color: var(--pink-deep); text-decoration: none; padding: 4px 10px; border: 1px solid var(--pink); border-radius: 12px; transition: all 0.2s; white-space: nowrap; }
    .weibo-link:hover { background: var(--pink); color: white; }

    /* POST BODY */
    .original-label { font-size: 10px; color: var(--text-light); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 3px; }
    .original-text { font-size: 13px; color: var(--text-muted); line-height: 1.8; padding: 10px 12px; background: var(--pink-pale); border-radius: 8px; border-left: 3px solid var(--pink-light); margin-bottom: 10px; }
    .translated-text { font-size: 15px; color: var(--text); line-height: 1.85; }
    .translation-note { font-size: 12px; color: var(--text-light); margin-top: 4px; line-height: 1.5; }
    .post-images { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin: 12px 0; }
    .post-images img { width: 100%; border-radius: 10px; object-fit: cover; max-height: 280px; }
    .post-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 10px; }
    .toggle-comments-btn { font-size: 12px; color: var(--pink-deep); background: var(--pink-light); border: none; padding: 5px 12px; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .toggle-comments-btn:hover { background: var(--pink); color: white; }

    /* COMMENTS */
    .comments-section { margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); display: none; }
    .comments-section.open { display: block; }
    .comments-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
    .comment-item { margin-bottom: 12px; padding: 10px 12px; background: var(--pink-pale); border-radius: 10px; }
    .comment-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .comment-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .comment-username { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .comment-original { font-size: 11px; color: var(--text-light); line-height: 1.6; margin-bottom: 3px; }
    .comment-translated { font-size: 13px; color: var(--text); line-height: 1.7; }
    .comment-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .comment-images img { width: auto; max-width: 100%; max-height: 180px; border-radius: 8px; object-fit: contain; }

    /* ACTOR REPLY */
    .actor-reply { margin-top: 10px; padding: 10px 12px; background: var(--pink-light); border-radius: 10px; border-left: 3px solid var(--pink); }
    .actor-reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .actor-reply-avatar { width: 28px; height: 28px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 1.5px solid var(--pink); }
    .actor-reply-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .actor-reply-name { font-size: 12px; font-weight: 700; color: var(--pink-deep); }
    .actor-reply-original { font-size: 11px; color: var(--pink-dark); line-height: 1.6; margin-bottom: 2px; }
    .actor-reply-translated { font-size: 13px; color: var(--pink-deep); font-weight: 500; line-height: 1.7; }

    /* SIDEBAR */
    .sidebar { display: flex; flex-direction: column; gap: 1rem; }
    .sidebar-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; }
    .sidebar-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .sidebar-title-dot { width: 6px; height: 6px; background: var(--pink); border-radius: 50%; display: inline-block; }
    .year-group { margin-bottom: 8px; }
    .year-label { font-size: 13px; font-weight: 700; color: var(--pink-deep); padding: 4px 0; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .year-label:hover { color: var(--pink-dark); }
    .month-list { padding-left: 12px; margin-top: 4px; }
    .month-item { font-size: 12px; color: var(--text-muted); padding: 4px 8px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; }
    .month-item:hover { background: var(--pink-light); color: var(--pink-deep); }
    .month-item.active { background: var(--pink); color: white; font-weight: 600; }
    .month-count { font-size: 10px; opacity: 0.7; }
    .notice-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text-muted); line-height: 1.7; }
    .notice-item:last-child { border-bottom: none; }
    .notice-label { font-size: 10px; color: var(--text-light); margin-top: 2px; font-weight: 500; }

    /* SEARCH */
    .search-bar { margin-bottom: 1rem; }
    .search-input { width: 100%; padding: 9px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; font-family: inherit; background: white; outline: none; color: var(--text); transition: border-color 0.2s; }
    .search-input:focus { border-color: var(--pink); }
    .search-input::placeholder { color: var(--text-light); }

    /* FILTER BAR */
    .filter-active-bar { font-size: 12px; color: var(--pink-deep); background: var(--pink-light); padding: 6px 12px; border-radius: 10px; margin-bottom: 1rem; display: none; align-items: center; justify-content: space-between; }
    .filter-active-bar.show { display: flex; }
    .clear-filter { cursor: pointer; font-weight: 600; color: var(--pink-deep); background: none; border: none; font-family: inherit; font-size: 12px; }

    /* EMPTY */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-light); }
    .empty-state .big-icon { font-size: 40px; margin-bottom: 12px; }

    /* FOOTER */
    .site-footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--text-light); border-top: 1px solid var(--border); margin-top: 2rem; }

    @media (max-width: 700px) {
  .main-layout { grid-template-columns: 1fr; padding: 1rem; }
  .sidebar { display: flex; }
  .hero-inner { flex-direction: column; gap: 1rem; text-align: center; }
  .hero-avatar { width: 100px; height: 100px; }
}
  </style>
</head>

<script>
  const ACTOR_IMG = 'IMG_1757.JPG';
  const ACTOR_NICK = '周翊然Tz';
  let currentFilter = { type: 'all', value: null };

  function formatDateTime(d) {
    const date = new Date(d);
    const month = date.getMonth() + 1;
    const day = date.getDate();
    const hour = d.includes('T') ? date.getHours().toString().padStart(2,'0') : null;
    const min = d.includes('T') ? date.getMinutes().toString().padStart(2,'0') : null;
    return hour ? `${month}월 ${day}일 ${hour}:${min}` : `${month}월 ${day}일`;
  }

  function formatUpdateDate(d) {
    const date = new Date(d);
    return `${date.getMonth()+1}월 ${date.getDate()}일`;
  }

  function getMonthLabel(d) {
    const date = new Date(d);
    return `${date.getFullYear()}년 ${date.getMonth()+1}월`;
  }

  function renderComment(c) {
    let replyHtml = '';
    if (c.actorReplies && c.actorReplies.length) {
      replyHtml = c.actorReplies.map(r => `
        <div class="actor-reply">
          <div class="actor-reply-header">
            <div class="actor-reply-avatar"><img src="${ACTOR_IMG}" alt="${ACTOR_NICK}" /></div>
            <span class="actor-reply-name">${ACTOR_NICK}</span>
          </div>
          <div class="actor-reply-original zh">${r.originalText}</div>
          <div class="actor-reply-translated">${r.translatedText}</div>
        </div>`).join('');
    } else if (c.actorReply) {
      replyHtml = `
        <div class="actor-reply">
          <div class="actor-reply-header">
            <div class="actor-reply-avatar"><img src="${ACTOR_IMG}" alt="${ACTOR_NICK}" /></div>
            <span class="actor-reply-name">${ACTOR_NICK}</span>
          </div>
          ${c.actorReply.originalText ? `<div class="actor-reply-original zh">${c.actorReply.originalText}</div>` : ''}
          ${c.actorReply.translatedText ? `<div class="actor-reply-translated">${c.actorReply.translatedText}</div>` : ''}
          ${c.actorReply.replyImages && c.actorReply.replyImages.length ? `<div class="comment-images">${c.actorReply.replyImages.map(src => `<img src="${src}" alt="답글 이미지" loading="lazy" />`).join('')}</div>` : ''}
        </div>`;
    }
    const isActor = c.username === ACTOR_NICK;
    const avatarHtml = isActor
      ? `<div class="comment-avatar" style="background:none;"><img src="${ACTOR_IMG}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" alt="${ACTOR_NICK}" /></div>`
     : c.username === '吃瓜罗伯特' ? `<div class="comment-avatar">🤖</div>` : `<div class="comment-avatar">🥣</div>`;
    return `
      <div class="comment-item">
        <div class="comment-header">
          ${avatarHtml}
          <span class="comment-username" style="${isActor ? 'color:var(--pink-deep);font-weight:700;' : ''}">${c.username}</span>
        </div>
        <div class="comment-original zh">${c.originalText}</div>
        <div class="comment-translated">${c.translatedText}</div>
        ${c.images && c.images.length ? `<div class="comment-images">${c.images.map(src => `<img src="${src}" alt="첨부 이미지" loading="lazy" />`).join('')}</div>` : ''}
        ${replyHtml}
      </div>`;
  }

  function commentMatches(c, query) {
    return (c.translatedText && c.translatedText.toLowerCase().includes(query)) ||
      (c.originalText && c.originalText.toLowerCase().includes(query)) ||
      (c.actorReply && c.actorReply.translatedText && c.actorReply.translatedText.toLowerCase().includes(query)) ||
      (c.actorReplies && c.actorReplies.some(r => r.translatedText && r.translatedText.toLowerCase().includes(query)));
  }

  function renderPost(post, query) {
    const imagesHtml = post.images && post.images.length
      ? `<div class="post-images">${post.images.map(src => `<img src="${src}" alt="게시물 이미지" loading="lazy" />`).join('')}</div>` : '';
    const youtubeHtml = post.youtubeUrl ? `<div style="margin:12px 0;border-radius:10px;overflow:hidden;aspect-ratio:16/9;"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${post.youtubeUrl.match(/(?:youtu\.be\/|v=)([^?&]+)/)[1]}" frameborder="0" allowfullscreen></iframe></div>` : '';
    let commentsHtml;
    let commentCount = post.comments ? post.comments.length : 0;
    let autoOpen = false;

    if (query && post.comments && post.comments.length) {
      const matched = post.comments.filter(c => commentMatches(c, query));
      if (matched.length > 0) {
        commentsHtml = matched.map(renderComment).join('');
        commentCount = matched.length;
        autoOpen = true;
      } else {
        commentsHtml = '<p style="font-size:13px;color:var(--text-light);text-align:center;padding:8px;">댓글이 없습니다.</p>';
      }
    } else {
      commentsHtml = post.comments && post.comments.length
        ? post.comments.map(renderComment).join('')
        : '<p style="font-size:13px;color:var(--text-light);text-align:center;padding:8px;">댓글이 없습니다.</p>';
    }

   return `
      <article class="post-card" id="post-${post.id}">
        <div class="post-meta">
          <div class="actor-avatar" style="${post.authorName ? 'display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--pink-light);' : ''}">
            ${post.authorName ? post.authorAvatar : `<img src="${ACTOR_IMG}" alt="${ACTOR_NICK}" />`}
          </div>
          <div class="post-meta-info">
            <div class="actor-name">${post.authorName || ACTOR_NICK}</div>
            <div class="post-date">${formatDateTime(post.date)}</div>
          </div>
          ${post.weiboUrl ? `<a class="weibo-link" href="${post.weiboUrl}" target="_blank" rel="noopener">원문 보기</a>` : ''}
        </div>
        <div class="post-body">
          <div class="original-label">원문</div>
          <div class="original-text zh">${post.originalText}</div>
         <div class="translated-text">${post.translatedText}</div>
          ${post.note ? `<div class="translation-note">${post.note}</div>` : ''}
        </div>
        ${imagesHtml}${youtubeHtml}
        <div class="post-footer">
          <button class="toggle-comments-btn" id="cmtbtn-${post.id}" onclick="toggleComments(${post.id})">
            댓글 보기 (${commentCount})
          </button>
        </div>
        <div class="comments-section${autoOpen ? ' open' : ''}" id="comments-${post.id}">
          <div class="comments-title">💬 댓글 번역${query && autoOpen ? ` <span style="font-size:11px;color:var(--pink);font-weight:400;">· "${query}" 검색 결과</span>` : ''}</div>
          ${commentsHtml}
        </div>
      </article>`;
  }

  function toggleComments(id) {
    const el = document.getElementById(`comments-${id}`);
    const btn = document.getElementById(`cmtbtn-${id}`);
    el.classList.toggle('open');
    if (el.classList.contains('open')) {
      const total = el.querySelectorAll('.comment-item').length;
      btn.textContent = `댓글 접기 ▲`;
    }
  }

  function getFilteredPosts() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = [...posts];

  if (currentFilter.type === 'year') {
    filtered = filtered.filter(p => new Date(p.date).getFullYear() === currentFilter.value);
  } else if (currentFilter.type === 'month') {
    filtered = filtered.filter(p => {
      const d = new Date(p.date);
      return d.getFullYear() === currentFilter.value.year && d.getMonth() + 1 === currentFilter.value.month;
    });
  }

  if (query) {
    filtered = filtered.filter(p =>
      p.translatedText.toLowerCase().includes(query) ||
      p.originalText.toLowerCase().includes(query) ||
      (p.comments && p.comments.some(c =>
        (c.translatedText && c.translatedText.toLowerCase().includes(query)) ||
        (c.originalText && c.originalText.toLowerCase().includes(query)) ||
        (c.actorReply && c.actorReply.translatedText && c.actorReply.translatedText.toLowerCase().includes(query))
      ))
    );
  }

  // 월 단위는 최신순, 월 안에서는 오래된순
  filtered.sort((a, b) => {
    const da = new Date(a.date);
    const db = new Date(b.date);
    const monthA = da.getFullYear() * 100 + da.getMonth();
    const monthB = db.getFullYear() * 100 + db.getMonth();
    if (monthA !== monthB) return monthB - monthA; // 월은 최신순
    return da - db; // 같은 월 안에서는 오래된순
  });

  return filtered;
}

  function renderFeed() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const filtered = getFilteredPosts();
    document.getElementById('feed-count').textContent = filtered.length + '개';

    if (filtered.length === 0) {
      document.getElementById('posts-feed').innerHTML = `<div class="empty-state"><div class="big-icon">🌸</div><p>게시물이 없습니다.</p></div>`;
      return;
    }

    // 날짜 인덱스 추가
    let html = '';
    let lastMonth = null;
    filtered.forEach(p => {
      const monthLabel = getMonthLabel(p.date);
      if (monthLabel !== lastMonth) {
        html += `<div class="date-index"><span class="date-index-badge">🗓 ${monthLabel}</span><span class="date-index-line"></span></div>`;
        lastMonth = monthLabel;
      }
      html += renderPost(p, query);
    });

    document.getElementById('posts-feed').innerHTML = html;
  }

  function filterByMonth(year, month) {
    currentFilter = { type: 'month', value: { year, month } };
    document.getElementById('filterLabel').textContent = `📅 ${year}년 ${month}월 게시물만 보는 중`;
    document.getElementById('filterBar').classList.add('show');
    renderFeed();
    document.querySelectorAll('.month-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`m-${year}-${month}`);
    if (el) el.classList.add('active');
  }

  function clearAllFilters() {
    currentFilter = { type: 'all', value: null };
    document.getElementById('filterBar').classList.remove('show');
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.month-item').forEach(el => el.classList.remove('active'));
    renderFeed();
  }

function renderDateTree() {
  const tree = {};
  posts.forEach(p => {
    const d = new Date(p.date);
    const y = d.getFullYear();
    const m = d.getMonth() + 1;
    if (!tree[y]) tree[y] = {};
    if (!tree[y][m]) tree[y][m] = 0;
    tree[y][m]++;
  });

  // 가장 최근 연도/월 구하기
  const latestYear = Math.max(...Object.keys(tree).map(Number));
  const latestMonth = Math.max(...Object.keys(tree[latestYear]).map(Number));

  document.getElementById('date-tree').innerHTML = Object.keys(tree).sort((a,b) => b-a).map(year => {
    const months = Object.keys(tree[year]).sort((a,b) => b-a).map(month => `
      <div class="month-item" id="m-${year}-${month}" onclick="filterByMonth(${year}, ${month})">
        <span>${month}월</span>
        <span class="month-count">${tree[year][month]}개</span>
      </div>`).join('');

    const isLatestYear = Number(year) === latestYear;
    return `
      <div class="year-group">
        <div class="year-label" onclick="toggleYear(this, ${year})">
          <span>${year}년</span><span class="year-arrow" style="font-size:10px;opacity:0.6;">▾</span>
        </div>
        <div class="month-list" id="year-${year}" style="${isLatestYear ? '' : 'display:none;'}">
          ${months}
        </div>
      </div>`;
  }).join('');

  // 최근 월 자동 활성화
  filterByMonth(latestYear, latestMonth);
}

function toggleYear(el, year) {
  const list = document.getElementById(`year-${year}`);
  const arrow = el.querySelector('.year-arrow');
  if (list.style.display === 'none') {
    list.style.display = 'block';
    arrow.textContent = '▴';
  } else {
    list.style.display = 'none';
    arrow.textContent = '▾';
  }
}

  renderFeed();
  renderDateTree();
</script>
